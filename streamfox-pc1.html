<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamFox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:"DM Sans",sans-serif;background:#080810;color:#eeeef5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
:root{--bg:#080810;--accent:#e5313a;--fox:#f97316;--t1:#eeeef5;--t2:rgba(238,238,245,0.6);--t3:rgba(238,238,245,0.3);--r8:8px;--nav:68px;--font-display:"Bebas Neue",sans-serif;--font:"DM Sans",sans-serif}

#splash{position:fixed;inset:0;z-index:9999;background:#080810;display:flex;align-items:center;justify-content:center;flex-direction:column}
.splash-logo{display:flex;align-items:center;gap:20px;opacity:0;animation:splashIn 0.8s cubic-bezier(.22,1,.36,1) 0.3s forwards}
.splash-mark{width:60px;height:60px;display:flex;align-items:center;justify-content:center;animation:splashIn 0.8s cubic-bezier(.22,1,.36,1) 0.3s forwards,foxGlow 2s ease 1.2s infinite}
.splash-mark svg{width:100%;height:100%;filter:drop-shadow(0 0 20px rgba(249,115,22,0.5))}
.splash-text{font-family:var(--font-display);font-size:64px;letter-spacing:2px;opacity:0;animation:splashIn 0.8s cubic-bezier(.22,1,.36,1) 0.4s forwards}
.splash-text em{color:var(--fox);font-style:normal}
.splash-bar{width:180px;height:2px;background:rgba(255,255,255,0.1);margin-top:24px;overflow:hidden;opacity:0;animation:splashIn 0.5s ease 1s forwards}
.splash-bar-fill{height:100%;background:linear-gradient(90deg,var(--fox),var(--accent));width:0%;animation:barFill 1s cubic-bezier(.4,0,.2,1) 1.2s forwards}
@keyframes splashIn{to{opacity:1}}
@keyframes barFill{to{width:100%}}
@keyframes foxGlow{0%,100%{filter:drop-shadow(0 0 20px rgba(249,115,22,0.4))}50%{filter:drop-shadow(0 0 50px rgba(249,115,22,0.8))}}

#navbar{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--nav);display:flex;align-items:center;padding:0 40px;transition:background 0.4s}
#navbar.scrolled{background:rgba(8,8,16,0.9);backdrop-filter:blur(20px);border-bottom:0.5px solid rgba(255,255,255,0.07)}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;flex-shrink:0;margin-right:36px}
.nav-mark{width:40px;height:40px;display:flex;align-items:center;justify-content:center;animation:navWiggle 0.5s ease}
.nav-logo:hover .nav-mark{animation:navWiggle 0.5s ease}
.nav-mark svg{width:100%;height:100%;filter:drop-shadow(0 0 8px rgba(249,115,22,0.3))}
.nav-logo:hover .nav-mark svg{filter:drop-shadow(0 0 16px rgba(249,115,22,0.6))}
@keyframes navWiggle{0%,100%{transform:rotate(0)}20%{transform:rotate(-3deg)}60%{transform:rotate(2deg)}80%{transform:rotate(-1deg)}}
.nav-text{font-family:var(--font-display);font-size:24px;letter-spacing:1.5px;color:var(--t1)}
.nav-text em{color:var(--fox);font-style:normal}
.nav-tabs{display:flex;gap:4px}
.nav-tab{padding:8px 16px;border-radius:var(--r8);font-size:13px;color:var(--t2);cursor:pointer;border:none;background:transparent;font-family:var(--font);font-weight:500;transition:all 0.15s}
.nav-tab:hover{color:var(--t1);background:rgba(255,255,255,0.06)}
.nav-tab.active{color:var(--t1);background:rgba(255,255,255,0.1)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.nav-search-wrap{position:relative;display:none}
.nav-search{width:220px;background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.13);border-radius:var(--r8);padding:8px 14px 8px 36px;color:var(--t1);font-family:var(--font);font-size:13px;outline:none;transition:all 0.2s}
.nav-search:focus{width:280px;border-color:var(--accent);background:rgba(229,49,58,0.06)}
.nav-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:0.4}
.nav-search-icon svg{width:15px;height:15px;stroke:var(--t1);fill:none;stroke-width:2}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--r8);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all 0.2s;text-decoration:none}
.btn-ghost{background:rgba(255,255,255,0.04);color:var(--t2);border:0.5px solid rgba(255,255,255,0.13)}
.btn-ghost:hover{background:rgba(255,255,255,0.08);color:var(--t1)}
.btn-sm{padding:7px 14px;font-size:12.5px}

#app{display:none;opacity:0;transition:opacity 0.6s}
#app.visible{display:block;opacity:1}

#importScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(249,115,22,0.06) 0%,transparent 70%);padding:var(--nav) 20px 40px}
.import-card{max-width:500px;width:100%;background:#0d0d18;border:0.5px solid rgba(255,255,255,0.13);border-radius:20px;padding:48px 52px;text-align:center;box-shadow:0 40px 120px rgba(0,0,0,0.5)}
.import-logo{width:80px;height:80px;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;animation:logoGlow 3s ease infinite}
.import-logo svg{width:100%;height:100%;filter:drop-shadow(0 0 15px rgba(249,115,22,0.3))}
@keyframes logoGlow{0%,100%{filter:drop-shadow(0 0 10px rgba(249,115,22,0.2))}50%{filter:drop-shadow(0 0 25px rgba(249,115,22,0.5))}}
.import-title{font-family:var(--font-display);font-size:40px;letter-spacing:1px;margin-bottom:8px}
.import-sub{font-size:13.5px;color:var(--t2);line-height:1.65;margin-bottom:28px}
.login-fields{display:flex;flex-direction:column;gap:13px;margin-bottom:18px;display:none}
.field-group{display:flex;flex-direction:column;gap:5px;text-align:left}
.field-label{font-size:10.5px;font-weight:600;color:var(--t3);letter-spacing:0.1em;text-transform:uppercase}
.field-input{width:100%;background:#080810;border:0.5px solid rgba(255,255,255,0.13);border-radius:var(--r8);padding:11px 16px;color:var(--t1);font-family:monospace;font-size:13px;outline:none;transition:border-color 0.2s}
.field-input:focus{border-color:var(--fox);background:rgba(249,115,22,0.04)}
.field-input::placeholder{font-family:var(--font);color:var(--t3)}
.field-input-wrap{position:relative}
.field-input.pad-right{padding-right:44px}
.field-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--t3);padding:4px}
.field-eye:hover{color:var(--t2)}
.field-eye svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--fox) 0%,var(--accent) 100%);color:white;border:none;border-radius:var(--r8);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 20px rgba(249,115,22,0.25)}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(249,115,22,0.4)}
.login-btn svg{width:16px;height:16px;stroke:white;fill:none;stroke-width:2.5}
.login-divider{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--t3);margin:16px 0}
.login-divider::before,.login-divider::after{content:"";flex:1;height:0.5px;background:rgba(255,255,255,0.07)}
.upload-zone{border:0.5px dashed rgba(255,255,255,0.13);border-radius:12px;padding:18px;cursor:pointer;transition:all 0.2s;font-size:13px;color:var(--t3);text-align:center}
.upload-zone:hover{border-color:var(--fox);color:var(--t2);background:rgba(249,115,22,0.05)}
.upload-zone input{display:none}
.upload-zone svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;display:block;margin:0 auto 7px}
.saved-banner{display:none;margin-bottom:16px;padding:12px 16px;background:rgba(249,115,22,0.08);border:0.5px solid rgba(249,115,22,0.2);border-radius:var(--r8);align-items:center;gap:12px;text-align:left}
.saved-info{flex:1;font-size:12.5px;color:var(--t2)}
.saved-info strong{color:var(--t1);display:block;font-size:13px;margin-bottom:1px}
.saved-clear{font-size:11.5px;color:var(--t3);cursor:pointer;border:none;background:none;font-family:var(--font);transition:color 0.15s;white-space:nowrap}
.saved-clear:hover{color:var(--accent)}
.prog-wrap{margin-top:18px;display:none}
.prog-bg{height:3px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--fox),var(--accent));width:0%;transition:width 0.4s ease}
.prog-label{font-size:12px;color:var(--t3);margin-top:8px}
.import-demo{font-size:12px;color:var(--t3);margin-top:16px}
.import-demo span{color:var(--fox);cursor:pointer;font-weight:500}

#catalogScreen{display:none;padding-top:var(--nav)}
.hero{position:relative;width:100%;height:85vh;min-height:600px;background:linear-gradient(135deg,#0d0d18,#18101a,#0d1018)}
.hero-content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:flex-end;padding:0 80px 80px;max-width:720px}
.hero-title{font-family:var(--font-display);font-size:clamp(44px,6vw,80px);letter-spacing:2px;line-height:0.9;margin-bottom:16px;text-shadow:0 2px 30px rgba(0,0,0,0.5)}
.hero-meta{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--t2);margin-bottom:12px;flex-wrap:wrap}
.hero-overview{font-size:13.5px;color:var(--t2);line-height:1.7;margin-bottom:24px;max-width:540px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.hero-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:var(--r8);border:none;font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s}
.hero-btn-play{background:white;color:#000}
.hero-btn-play:hover{background:rgba(255,255,255,0.88)}
.hero-btn-info{background:rgba(255,255,255,0.1);color:white;backdrop-filter:blur(10px)}
.hero-btn-info:hover{background:rgba(255,255,255,0.2)}

.catalog-body{padding:0 60px 60px}
.stats-row{display:flex;background:#0d0d18;border:0.5px solid rgba(255,255,255,0.07);border-radius:12px;overflow:hidden;margin-bottom:40px;margin-top:-60px}
.stat-box{flex:1;padding:20px 24px;border-right:0.5px solid rgba(255,255,255,0.07);display:flex;flex-direction:column}
.stat-box:last-child{border-right:none}
.stat-val{font-size:28px;font-family:var(--font-display);letter-spacing:1px;color:var(--t1)}
.stat-lbl{font-size:11px;color:var(--t3);text-transform:uppercase;margin-top:4px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:40px}
.card{background:#0d0d18;border-radius:12px;cursor:pointer;border:0.5px solid rgba(255,255,255,0.07);transition:all 0.25s;overflow:hidden}
.card:hover{transform:translateY(-6px);box-shadow:0 20px 50px rgba(0,0,0,0.6);border-color:rgba(255,255,255,0.13)}
.card-poster{width:100%;aspect-ratio:2/3;background:#161625;overflow:hidden}
.card-poster img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.3s}
.card:hover .card-poster img{transform:scale(1.05)}
.card-info{padding:10px 12px}
.card-title{font-size:12.5px;font-weight:500;color:var(--t1);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{font-size:11px;color:var(--t3);margin-top:6px}

#playerModal{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.93);backdrop-filter:blur(14px);display:none;opacity:0;align-items:flex-start;justify-content:center;padding:40px 20px 60px;overflow-y:auto}
#playerModal.open{display:flex;opacity:1}
.modal-wrap{width:100%;max-width:1000px;background:#0d0d18;border-radius:20px;border:0.5px solid rgba(255,255,255,0.13);overflow:hidden;animation:modalPop 0.32s cubic-bezier(.22,1,.36,1)}
@keyframes modalPop{from{opacity:0;transform:scale(0.96) translateY(20px)}to{opacity:1;transform:none}}
.modal-video{position:relative;background:#000;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center}
.modal-video video{width:100%;height:100%;display:block}
.modal-loading{position:absolute;display:flex;flex-direction:column;align-items:center;gap:14px;color:var(--t3);font-size:13px}
.spinner{width:36px;height:36px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--fox);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.7);border:0.5px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.2s;z-index:10;color:white;padding:0}
.modal-close:hover{background:var(--accent)}
.modal-close svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5}
.modal-body{padding:28px 36px;display:flex;gap:24px}
.modal-poster{width:120px;flex-shrink:0;border-radius:12px;overflow:hidden;background:#161625}
.modal-poster img{width:100%;display:block}
.modal-info{flex:1}
.modal-title{font-size:24px;font-weight:600;margin-bottom:8px}
.modal-overview{font-size:13px;color:var(--t2);line-height:1.7;margin-top:12px}

.toast{position:fixed;bottom:28px;right:28px;z-index:999;background:#161625;border:0.5px solid rgba(255,255,255,0.13);border-radius:12px;padding:13px 20px;font-size:13px;display:flex;align-items:center;gap:10px;transform:translateY(80px);opacity:0;transition:all 0.3s;pointer-events:none}
.toast.show{transform:none;opacity:1}
.toast.ok{border-left:2px solid #2ee87a}
.toast.err{border-left:2px solid var(--accent)}
</style>
</head>
<body>

<div id="splash">
  <div class="splash-logo">
    <div class="splash-mark">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <!-- Fox head -->
        <path d="M50 10 L70 30 L75 20 C80 15, 85 15, 85 25 C85 35, 75 40, 70 35 L50 50 L30 35 C25 40, 15 35, 15 25 C15 15, 20 15, 25 20 L30 30 Z" fill="#f97316" stroke="none"/>
        <!-- Eyes -->
        <circle cx="40" cy="40" r="3" fill="#fff"/>
        <circle cx="60" cy="40" r="3" fill="#fff"/>
        <!-- Nose -->
        <polygon points="50,50 48,55 52,55" fill="#fff"/>
      </svg>
    </div>
    <div class="splash-text">stream<em>fox</em></div>
  </div>
  <div class="splash-bar"><div class="splash-bar-fill"></div></div>
</div>

<nav id="navbar">
  <a class="nav-logo" href="#" onclick="goHome();return false">
    <div class="nav-mark">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 10 L70 30 L75 20 C80 15, 85 15, 85 25 C85 35, 75 40, 70 35 L50 50 L30 35 C25 40, 15 35, 15 25 C15 15, 20 15, 25 20 L30 30 Z" fill="#f97316"/>
        <circle cx="40" cy="40" r="3" fill="#fff"/>
        <circle cx="60" cy="40" r="3" fill="#fff"/>
        <polygon points="50,50 48,55 52,55" fill="#fff"/>
      </svg>
    </div>
    <span class="nav-text">stream<em>fox</em></span>
  </a>
  <div class="nav-tabs" id="navTabs" style="display:none">
    <button class="nav-tab active" onclick="navTo('all',this)">Início</button>
    <button class="nav-tab" onclick="navTo('movies',this)">Filmes</button>
    <button class="nav-tab" onclick="navTo('series',this)">Séries</button>
    <button class="nav-tab" onclick="navTo('live',this)">Ao Vivo</button>
  </div>
  <div class="nav-right">
    <button class="btn btn-ghost btn-sm" id="btnChange" style="display:none" onclick="goHome()">Trocar Lista</button>
  </div>
</nav>

<div id="app">
  <div id="importScreen">
    <div class="import-card">
      <div class="import-logo">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 10 L70 30 L75 20 C80 15, 85 15, 85 25 C85 35, 75 40, 70 35 L50 50 L30 35 C25 40, 15 35, 15 25 C15 15, 20 15, 25 20 L30 30 Z" fill="#f97316"/>
          <circle cx="40" cy="40" r="3" fill="#fff"/>
          <circle cx="60" cy="40" r="3" fill="#fff"/>
          <polygon points="50,50 48,55 52,55" fill="#fff"/>
        </svg>
      </div>
      <h1 class="import-title">Entrar</h1>
      <p class="import-sub">Use as credenciais do seu provedor IPTV para acessar o catálogo completo.</p>
      <div class="saved-banner" id="savedBanner">
        <svg viewBox="0 0 24 24" style="width:18px;height:18px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <div class="saved-info"><strong id="savedUser"></strong>Credenciais salvas</div>
        <button class="saved-clear" onclick="clearSaved()">Trocar</button>
      </div>
      <div class="login-fields" id="loginFields" style="display:flex">
        <div class="field-group">
          <label class="field-label">Servidor</label>
          <input class="field-input" id="fServer" type="text" placeholder="ex: servidor.provedor.com" autocomplete="off" spellcheck="false">
        </div>
        <div class="field-group">
          <label class="field-label">Usuário</label>
          <input class="field-input" id="fUser" type="text" placeholder="Seu login" autocomplete="off">
        </div>
        <div class="field-group">
          <label class="field-label">Senha</label>
          <div class="field-input-wrap">
            <input class="field-input pad-right" id="fPass" type="password" placeholder="Sua senha" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
            <button class="field-eye" onclick="togglePass(this)" tabindex="-1">
              <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
      </div>
      <button class="login-btn" onclick="doLogin()">Acessar Catálogo</button>
      <div class="login-divider">ou</div>
      <label class="upload-zone">
        <input type="file" accept=".m3u,.m3u8,.txt" onchange="loadFromFile(this)">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Enviar arquivo <strong>.m3u</strong>
      </label>
      <div class="prog-wrap" id="progWrap">
        <div class="prog-bg"><div class="prog-fill" id="progFill"></div></div>
        <div class="prog-label" id="progLabel">Carregando...</div>
      </div>
      <div class="import-demo">Sem conta? <span onclick="loadDemo()">Ver demonstração</span></div>
    </div>
  </div>

  <div id="catalogScreen">
    <div class="hero">
      <div class="hero-content">
        <h1 class="hero-title" id="heroTitle">Carregando...</h1>
        <div class="hero-meta" id="heroMeta"></div>
        <p class="hero-overview" id="heroOverview"></p>
        <button class="hero-btn hero-btn-play" onclick="openPlayer()">Assistir</button>
      </div>
    </div>
    <div class="catalog-body">
      <div class="stats-row">
        <div class="stat-box"><span class="stat-val" id="st-total">0</span><span class="stat-lbl">Total</span></div>
        <div class="stat-box"><span class="stat-val" id="st-movies">0</span><span class="stat-lbl">Filmes</span></div>
        <div class="stat-box"><span class="stat-val" id="st-series">0</span><span class="stat-lbl">Séries</span></div>
        <div class="stat-box"><span class="stat-val" id="st-live">0</span><span class="stat-lbl">Ao Vivo</span></div>
      </div>
      <div class="grid" id="contentArea"></div>
    </div>
  </div>
</div>

<div id="playerModal" onclick="if(event.target===this)closePlayer()">
  <div class="modal-wrap">
    <div class="modal-video">
      <video id="vid" controls playsinline></video>
      <div class="modal-loading" id="mLoading"><div class="spinner"></div><span>Conectando...</span></div>
      <button class="modal-close" onclick="closePlayer()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="modal-poster" id="mPoster"></div>
      <div class="modal-info">
        <h2 class="modal-title" id="mTitle"></h2>
        <div id="mMeta"></div>
        <p class="modal-overview" id="mOverview"></p>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toastMsg"></span></div>

<script>
const S={channels:[],nav:'all',group:null,quality:'all',sort:'default',search:'',heroItem:null,hlsInst:null};
const TMDB_KEY='0b6688652aa2c4cfe094f2e20af61fa4';
const OMDB_KEY='trilogy';
const CREDS_KEY='sf_creds';

window.addEventListener('DOMContentLoaded',()=>{
  setTimeout(()=>{
    const sp=document.getElementById('splash');
    sp.style.opacity='0';
    sp.style.transition='opacity 0.8s ease';
    setTimeout(()=>{
      sp.style.display='none';
      const app=document.getElementById('app');
      app.classList.add('visible');
      setTimeout(loadSaved,200);
    },800);
  },2600);
});

window.addEventListener('scroll',()=>document.getElementById('navbar').classList.toggle('scrolled',window.scrollY>20));

function loadSaved(){const s=JSON.parse(localStorage.getItem(CREDS_KEY)||'null');if(s){document.getElementById('savedUser').textContent=s.user+' @ '+s.server;document.getElementById('savedBanner').style.display='flex';document.getElementById('loginFields').style.display='none';doLoginWithCreds(s.server,s.user,s.pass);}}
function clearSaved(){localStorage.removeItem(CREDS_KEY);document.getElementById('savedBanner').style.display='none';document.getElementById('loginFields').style.display='flex';}
function togglePass(btn){const i=document.getElementById('fPass');i.type=i.type==='password'?'text':'password';}
function doLogin(){const sv=document.getElementById('fServer').value.trim();const u=document.getElementById('fUser').value.trim();const p=document.getElementById('fPass').value.trim();if(!sv||!u||!p){toast('Preencha todos os campos','err');return;}localStorage.setItem(CREDS_KEY,JSON.stringify({server:sv,user:u,pass:p}));doLoginWithCreds(sv,u,p);}
async function doLoginWithCreds(sv,u,p){
  const url=`http://${sv}/get.php?username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}&type=m3u_plus&output=ts`;
  setProgress('Conectando...',5);
  let text=null;
  try{text=await fetch(url).then(r=>r.text());}catch{}
  if(!text||!text.includes('#EXTM3U')){hideProg();toast('Erro ao conectar','err');return;}
  setProgress('Analisando...',50);
  const chs=parseM3U(text);
  if(!chs.length){toast('Nenhum canal encontrado','err');return;}
  setProgress('Pronto!',100);
  setTimeout(()=>{hideProg();initCatalog(chs);},300);
}

function parseM3U(txt){
  const lines=txt.split('\n');
  const out=[];
  let cur=null;
  for(let line of lines){
    line=line.trim();
    if(line.startsWith('#EXTINF')){
      cur={name:'',group:'',url:'',quality:'',type:'live'};
      const m=line.match(/,(.+)$/);if(m)cur.name=m[1].trim();
      const g=line.match(/group-title="([^"]*)"/i);if(g)cur.group=g[1].trim();
      const c=cur.name+cur.group;
      if(/4K/i.test(c))cur.quality='4K';else if(/FHD|1080/i.test(c))cur.quality='FHD';else if(/HD|720/i.test(c))cur.quality='HD';
      if(/filme|movie|vod/i.test(c))cur.type='movie';else if(/serie|series|season/i.test(c))cur.type='series';
    }else if(line&&!line.startsWith('#')&&cur){
      cur.url=line;
      cur.id=btoa(cur.name+cur.url).slice(0,24);
      out.push(cur);
      cur=null;
    }
  }
  return out;
}

async function initCatalog(chs){S.channels=chs;updateCounts();document.getElementById('importScreen').style.display='none';document.getElementById('catalogScreen').style.display='block';document.getElementById('navTabs').style.display='flex';document.getElementById('btnChange').style.display='flex';renderCatalog();toast(chs.length+' canais carregados!','ok');}
function updateCounts(){const t=S.channels.length,m=S.channels.filter(c=>c.type==='movie').length,s=S.channels.filter(c=>c.type==='series').length,l=S.channels.filter(c=>c.type==='live').length;document.getElementById('st-total').textContent=t;document.getElementById('st-movies').textContent=m;document.getElementById('st-series').textContent=s;document.getElementById('st-live').textContent=l;}

function renderCatalog(){
  const area=document.getElementById('contentArea');
  let items=S.channels;
  if(S.nav==='movies')items=items.filter(c=>c.type==='movie');else if(S.nav==='series')items=items.filter(c=>c.type==='series');else if(S.nav==='live')items=items.filter(c=>c.type==='live');
  if(S.search)items=items.filter(c=>c.name.toLowerCase().includes(S.search));
  area.innerHTML=items.map(ch=>`
    <div class="card" onclick="openPlayer('${ch.id}')">
      <div class="card-poster"><img src="https://via.placeholder.com/300x450?text=${encodeURIComponent(ch.name)}" alt="${ch.name}"></div>
      <div class="card-info"><div class="card-title">${ch.name}</div><div class="card-meta">${ch.quality||'SD'}</div></div>
    </div>
  `).join('');
}

function openPlayer(id){
  const ch=S.channels.find(c=>c.id===id);if(!ch)return;
  document.getElementById('mTitle').textContent=ch.name;
  document.getElementById('mOverview').textContent=ch.group;
  document.getElementById('playerModal').classList.add('open');
  document.body.style.overflow='hidden';
  const vid=document.getElementById('vid');
  if(ch.url){
    if(Hls.isSupported()){const hls=new Hls();hls.loadSource(ch.url);hls.attachMedia(vid);hls.on(Hls.Events.MANIFEST_PARSED,()=>{document.getElementById('mLoading').style.display='none';vid.play().catch(()=>{});});}else{vid.src=ch.url;}
  }
}
function closePlayer(){document.getElementById('playerModal').classList.remove('open');document.body.style.overflow='';document.getElementById('vid').pause();document.getElementById('mLoading').style.display='flex';}

function navTo(type,el){document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');S.nav=type;renderCatalog();}
function onSearch(v){S.search=v.toLowerCase();renderCatalog();}

async function loadFromFile(inp){const f=inp.files[0];if(!f)return;const t=await f.text();if(!t.includes('#EXTM3U')){toast('Arquivo inválido','err');return;}const chs=parseM3U(t);initCatalog(chs);}
async function loadDemo(){
  const items=[
    {name:'Oppenheimer',type:'movie',group:'Filmes | Drama',quality:'4K',url:''},
    {name:'Dune Part Two',type:'movie',group:'Filmes | Ação',quality:'4K',url:''},
    {name:'The Last of Us',type:'series',group:'Séries | HBO',quality:'4K',url:''},
    {name:'Succession',type:'series',group:'Séries | HBO',quality:'FHD',url:''},
    {name:'Globo HD',type:'live',group:'Ao Vivo | Brasil',quality:'HD',url:''},
  ].map((c,i)=>({...c,id:btoa(c.name+i).slice(0,24)}));
  initCatalog(items);
}

function goHome(){S.channels=[];S.nav='all';document.getElementById('catalogScreen').style.display='none';document.getElementById('importScreen').style.display='flex';document.getElementById('navTabs').style.display='none';document.getElementById('btnChange').style.display='none';}

function setProgress(msg,pct){const w=document.getElementById('progWrap');w.style.display='block';document.getElementById('progFill').style.width=pct+'%';document.getElementById('progLabel').textContent=msg;}
function hideProg(){document.getElementById('progWrap').style.display='none';}

let _tt;
function toast(msg,type='ok'){const t=document.getElementById('toast');document.getElementById('toastMsg').textContent=msg;t.className='toast '+type;void t.offsetWidth;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),3000);}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closePlayer();});
</script>
</body>
</html>
